<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#396cf0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance Tracker">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/192/192161.png">
    <link rel="manifest" href="./manifest.json">
    <title>Income & Expense Tracker</title>

    <link rel="stylesheet" href="https://unpkg.com/dseg@0.4.0/css/dseg.css">

{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.1.0/client",
    "recharts": "https://esm.sh/recharts@^2.15.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.0.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2",
    "pdfjs-dist/build/pdf.min.mjs": "https://esm.sh/pdfjs-dist@4.5.136/build/pdf.min.mjs",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "pdfjs-dist/": "https://esm.sh/pdfjs-dist@^5.4.449/"
  }
}
</script>
<style>
  :root {
    --color-brand-primary: #396cf0;
    --color-brand-secondary: #10B981;
    --color-income: #10B981;
    --color-expense: #EF4444;
    --color-text-base: #374151;
    --color-text-muted: #6b7280;
    --color-text-disabled: #9ca3af;
    --color-text-inverted: #FFFFFF;
    --color-text-link: #396cf0;
    --color-bg-primary: #FFFFFF;
    --color-bg-secondary: #FFFFFF;
    --color-bg-accent: #f9fafb;
    --color-bg-disabled: #f3f4f6;
    --color-border-primary: #e5e7eb;
    --color-border-secondary: #f3f4f6;
    --color-border-focus: #396cf0;
    --color-chart-income: #10B981;
    --color-chart-expense: #EF4444;
    --color-chart-axis-color: #6b7280;
    --color-chart-grid-color: #e5e7eb;
    --color-chart-tooltip-bg: #FFFFFF;
    --color-chart-tooltip-text: #374151;
    --color-chart-legend-text: #4b5563;
  }

  html.dark :root {
    --color-brand-primary: #6366F1;
    --color-brand-secondary: #34D399;
    --color-income: #34D399;
    --color-expense: #F87171;
    --color-text-base: #e5e7eb;
    --color-text-muted: #9ca3af;
    --color-text-disabled: #4b5563;
    --color-text-inverted: #FFFFFF;
    --color-text-link: #818cf8;
    --color-bg-primary: #111827;
    --color-bg-secondary: #1f2937;
    --color-bg-accent: #3730a3;
    --color-bg-disabled: #374151;
    --color-border-primary: #4b5563;
    --color-border-secondary: #374151;
    --color-border-focus: #6366F1;
    --color-chart-income: #34D399;
    --color-chart-expense: #F87171;
    --color-chart-axis-color: #9ca3af;
    --color-chart-grid-color: #374151;
    --color-chart-tooltip-bg: #1f2937;
    --color-chart-tooltip-text: #e5e7eb;
    --color-chart-legend-text: #d1d5db;
  }

  body {
    background-color: var(--color-bg-primary); 
    color: var(--color-text-base); 
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* Alert Marquee */
  .marquee-container {
    color: white;
    padding: 0.5rem;
    display: flex;
    align-items: center;
    overflow: hidden;
    border-radius: 0.75rem;
    margin-top: 0.5rem;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
  }
  .marquee-icon {
    width: 1.25rem;
    height: 1.25rem;
    flex-shrink: 0;
    margin-right: 0.75rem;
  }
  .marquee-content-wrapper {
    flex-grow: 1;
    overflow: hidden;
    position: relative; 
    height: 1.25rem; 
  }
  .marquee-text-item {
    position: absolute;
    width: 100%;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .marquee-text-content {
      flex-grow: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
  }
  .marquee-count {
      flex-shrink: 0;
      margin-left: 0.5rem; 
      font-size: 0.75rem; 
      opacity: 0.8;
  }
  .marquee-text-item.enter {
    animation: alert-slide-in 0.5s forwards ease-out;
  }
  .marquee-text-item.exit {
    animation: alert-slide-out 0.5s forwards ease-in;
  }
  .marquee-close-btn {
    margin-left: 0.75rem;
    padding: 0.25rem;
    border-radius: 9999px;
    background-color: rgba(0,0,0,0.2);
    transition: background-color 0.2s;
  }
  .marquee-close-btn:hover {
    background-color: rgba(0,0,0,0.4);
  }

  @keyframes alert-slide-in {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes alert-slide-out {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-100%); opacity: 0; }
  }

  /* Pill Notification */
  .pill-notification {
    position: fixed;
    top: 1rem; 
    left: 50%;
    z-index: 100;
    transform: translateX(-50%) scale(0.9) translateY(-30px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease;
    pointer-events: none;
  }
  .pill-notification.visible {
    transform: translateX(-50%) scale(1) translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  .pill-notification-content {
    display: flex;
    align-items: center;
    gap: 0.5rem; 
    padding: 0.5rem 0.5rem 0.5rem 1rem; 
    border-radius: 9999px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }
  
  .pill-notification-text {
    flex-grow: 1;
    padding-right: 0.5rem; 
  }

  .dark .pill-notification-content {
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
  }

  /* Festive Animation Styles */
  .festive-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; 
    overflow: hidden;
    z-index: 10;
  }

  .festive-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem; 
    font-weight: bold;
    color: #FFD700; 
    text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 20px #FF8C00, 0 0 30px #FF8C00, 0 0 40px #FF8C00;
    animation: festive-flicker 2s infinite alternate, festive-fade-in 1s ease-out;
    white-space: nowrap;
  }

  @keyframes festive-fade-in {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  @keyframes festive-flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% {
      opacity: 1;
      text-shadow: 0 0 4px #fff, 0 0 10px #ff0, 0 0 20px #ff0, 0 0 40px #f90, 0 0 80px #f90;
    }
    20%, 24%, 55% { opacity: 0.8; text-shadow: none; }
  }

  .firework {
    position: absolute;
    width: 4px;
    height: 4px;
    background-image: radial-gradient(circle, #fff 0%, #ff0 40%, #f90 70%, rgba(255,153,0,0) 100%);
    border-radius: 50%;
    opacity: 0;
    animation: firework-explode 1.5s ease-out infinite;
    transform: scale(0);
  }

  @keyframes firework-explode {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(30); opacity: 0; }
  }

  .is-today .day-number {
    position: relative; 
    z-index: 1;
    font-weight: 900 !important; 
    display: inline-block; 
  }

  .h-20 .day-number, .h-24 .day-number, .h-28 .day-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.75rem; 
    height: 1.75rem; 
    font-size: 0.8rem;
  }

  .is-today .day-number::after {
    content: '';
    position: absolute;
    top: -6px;
    left: -6px;
    right: -6px;
    bottom: -6px;
    border: 2px solid var(--color-brand-primary);
    border-radius: 50% 45% 55% 40% / 40% 55% 45% 60%;
    animation: doodle-rotate 10s linear infinite;
    opacity: 0.9;
    z-index: -1;
    transform-origin: center;
  }

  @keyframes doodle-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes iconPopIn {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.2); opacity: 1; } 
    100% { transform: scale(1); opacity: 1; }
  }
  .animate-icon-pop-in { animation: iconPopIn 0.3s ease-out forwards; }

  @keyframes modalEnter {
    from { opacity: 0; transform: scale(0.95) translateY(-20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .animate-modal-enter { animation: modalEnter 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; } 
  }
  .animate-blink { animation: blink 1s infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    animation: spin 1s ease-in-out infinite;
  }

  @keyframes transactionAdded {
    from { opacity: 0; transform: translateY(-15px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .animate-transaction-add { animation: transactionAdded 0.4s ease-out forwards; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .animate-shake {
    animation: shake 0.3s ease-in-out;
  }
</style>

</head>

</html>
